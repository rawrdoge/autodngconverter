version: "3.8"

# Temporary e2e harness for the Go service (sibling-container topology).
# The Go service targets MySQL only (go-sql-driver/mysql). The pure-Go
# MySQL driver stalls against MariaDB 10.11 over container TCP — that is a
# KNOWN issue (see metrics.go/db.go comments). For a MariaDB backend, use
# the C++ service (docker-compose.cpp-e2e.yml, src/, Dockerfile.cpp)
# which uses libmariadb and is the validated MariaDB implementation.
# This file tests the Go service against MySQL 8.0 (its supported backend).
services:
  mysql:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    environment:
      - MYSQL_ROOT_PASSWORD=rootpw
      - MYSQL_DATABASE=rawimport
      - MYSQL_USER=rawimport
      - MYSQL_PASSWORD=rawpw
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-prawpw"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  rawimport:
    image: rawimport-go-e2e:latest
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=rawimport
      - DB_PASSWORD=rawpw
      - DB_NAME=rawimport
      - PORT=8080
      - WATCH_DIR=/watch
      - OUTPUT_DIR=/output
      - ARCHIVE_DIR=/archive
      - ROTATION_GRACE_MS=200
    ports:
      - "8090:8080"
    command: ["/usr/local/bin/rawimport-pipeline"]